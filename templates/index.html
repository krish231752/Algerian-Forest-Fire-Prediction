<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forest Fire Prediction</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="bg-light-gradient">

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            
            <div class="text-center mb-4 text-white">
                <h2><i class="fas fa-fire-alt text-warning"></i> Algerian Forest Fire Prediction</h2>
                <p>Enter the environmental metrics below to predict the Fire Weather Index (FWI).</p>
            </div>

            <div class="card shadow-lg border-0 rounded-4">
                <div class="card-body p-4 p-md-5">
                    
                    {% if error %}
                    <div class="alert alert-danger">{{ error }}</div>
                    {% endif %}

                    <form action="{{ url_for('predict') }}" method="POST" id="predictForm">
                        <div class="row g-3">
                            <!-- Region -->
                            <div class="col-md-6">
                                <label class="form-label text-muted">Region</label>
                                <select class="form-select" name="Region" required>
                                    <option value="" selected disabled>Select Region...</option>
                                    <option value="0">Bejaia (0)</option>
                                    <option value="1">Sidi Bel-Abbes (1)</option>
                                </select>
                            </div>

                            <!-- Classes -->
                            <div class="col-md-6">
                                <label class="form-label text-muted">Classes</label>
                                <select class="form-select" name="Classes" required>
                                    <option value="" selected disabled>Select Class...</option>
                                    <option value="0">Not Fire (0)</option>
                                    <option value="1">Fire (1)</option>
                                </select>
                            </div>

                            <!-- Temperature -->
                            <div class="col-md-6">
                                <label class="form-label text-muted">Temperature (°C)</label>
                                <input type="number" step="any" class="form-control" name="Temperature" placeholder="e.g. 35" required>
                            </div>

                            <!-- Relative Humidity -->
                            <div class="col-md-6">
                                <label class="form-label text-muted">Relative Humidity (%)</label>
                                <input type="number" step="any" class="form-control" name="RH" placeholder="e.g. 60" required>
                            </div>

                            <!-- Wind Speed -->
                            <div class="col-md-6">
                                <label class="form-label text-muted">Wind Speed (km/h)</label>
                                <input type="number" step="any" class="form-control" name="Ws" placeholder="e.g. 15" required>
                            </div>

                            <!-- Rain -->
                            <div class="col-md-6">
                                <label class="form-label text-muted">Rain (mm)</label>
                                <input type="number" step="any" class="form-control" name="Rain" placeholder="e.g. 0.5" required>
                            </div>

                            <!-- FFMC -->
                            <div class="col-md-4">
                                <label class="form-label text-muted">FFMC</label>
                                <input type="number" step="any" class="form-control" name="FFMC" placeholder="e.g. 80" required>
                            </div>

                            <!-- DMC -->
                            <div class="col-md-4">
                                <label class="form-label text-muted">DMC</label>
                                <input type="number" step="any" class="form-control" name="DMC" placeholder="e.g. 15" required>
                            </div>

                            <!-- ISI -->
                            <div class="col-md-4">
                                <label class="form-label text-muted">ISI</label>
                                <input type="number" step="any" class="form-control" name="ISI" placeholder="e.g. 8" required>
                            </div>
                        </div>

                        <div class="d-grid mt-4 pt-2">
                            <button type="submit" class="btn btn-primary btn-lg" id="submitBtn">
                                <span id="btnText">Predict FWI</span>
                                <span id="btnSpinner" class="spinner-border spinner-border-sm d-none" role="status" aria-hidden="true"></span>
                            </button>
                        </div>
                    </form>

                </div>
            </div>
        </div>
    </div>
</div>

<script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
