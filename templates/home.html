<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prediction Result</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="bg-light-gradient">

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            
            <div class="card shadow-lg border-0 rounded-4 text-center p-4">
                <div class="card-body">
                    <h4 class="text-muted mb-4">Prediction Dashboard</h4>
                    
                    <div class="alert {{ alert_class }} rounded-3 py-4 mb-4">
                        <h1 class="display-4 fw-bold mb-0">{{ result }}</h1>
                        <p class="mb-0 text-uppercase tracking-wide mt-2">Fire Weather Index (FWI)</p>
                    </div>

                    <h3 class="fw-bold mb-3">{{ risk }}</h3>
                    
                    <div class="p-3 bg-light rounded-3 text-start mb-4 border">
                        <p class="mb-0 text-secondary"><i class="fas fa-info-circle me-2"></i><strong>Recommendation:</strong> {{ recommendation }}</p>
                    </div>

                    <a href="{{ url_for('index') }}" class="btn btn-outline-secondary w-100 py-2">
                        <i class="fas fa-arrow-left me-2"></i> Predict Again
                    </a>
                </div>
            </div>

        </div>
    </div>
</div>

</body>
</html>
